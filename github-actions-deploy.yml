# ---------------------------------------------------------------
# .github/workflows/deploy.yml
# GitHub Actions CI/CD Pipeline
#
# WHAT THIS DOES:
#   Every time you push code to GitHub, this automatically:
#   1. Runs your tests
#   2. Builds the frontend Docker image
#   3. Deploys to your server
#
# HOW TO SET UP:
#   1. Go to GitHub repo → Settings → Secrets → Actions
#   2. Add these secrets (explained below)
#   3. Push to main → auto deploys to production
#      Push to develop → auto deploys to staging
# ---------------------------------------------------------------

name: Build and Deploy

on:
  push:
    branches:
      - main       # push here = deploy to production
      - develop    # push here = deploy to staging
  pull_request:
    branches:
      - main       # on pull request = just run tests, no deploy

# ---------------------------------------------------------------
# JOB 1: Run Tests
# Runs on every push and pull request
# ---------------------------------------------------------------
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --watchAll=false

  # ---------------------------------------------------------------
  # JOB 2: Build Docker Image
  # Only runs on push (not pull requests)
  # Builds the frontend React app into a Docker image
  # and pushes it to GitHub's container registry (free)
  # ---------------------------------------------------------------
  build:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: test                           # only runs if tests pass
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided by GitHub, no setup needed

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  # ---------------------------------------------------------------
  # JOB 3a: Deploy to Staging
  # Runs when you push to the "develop" branch
  #
  # Required GitHub Secrets to add:
  #   STAGING_HOST     = IP address of your staging server
  #   STAGING_USER     = SSH username (usually "ubuntu")
  #   STAGING_SSH_KEY  = your private SSH key
  # ---------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_HOST }}:3000

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/tictactoe
            docker compose pull
            docker compose up -d
            docker compose ps

  # ---------------------------------------------------------------
  # JOB 3b: Deploy to Production
  # Runs when you push to the "main" branch
  #
  # Required GitHub Secrets to add:
  #   PROD_HOST     = IP address of your production server
  #   PROD_USER     = SSH username (usually "ubuntu")
  #   PROD_SSH_KEY  = your private SSH key
  # ---------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://${{ secrets.PROD_HOST }}:3000

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/tictactoe
            docker compose pull
            docker compose up -d --no-downtime
            docker compose ps

      - name: Verify deployment (health check)
        run: |
          sleep 15
          curl --fail http://${{ secrets.PROD_HOST }}:7350/healthcheck
