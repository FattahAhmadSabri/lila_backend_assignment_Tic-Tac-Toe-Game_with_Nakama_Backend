version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: nakama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: nakama
    restart: unless-stopped
    depends_on:
      - postgres
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        sleep 5;
        /nakama/nakama migrate up --database.address postgres://nakama:localpassword@postgres:5432/nakama &&
        exec /nakama/nakama \
          --database.address postgres://nakama:localpassword@postgres:5432/nakama \
          --console.username admin \
          --console.password admin123
    volumes:
      - ./nakama/data:/nakama/data   
    ports:
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres-data:   