version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: nakama-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: nakama
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        sleep 5;
        /nakama/nakama migrate up --database.address ${NAKAMA_DB_URL} &&
        exec /nakama/nakama \
          --database.address ${NAKAMA_DB_URL} \
          --console.username ${NAKAMA_CONSOLE_USER} \
          --console.password ${NAKAMA_CONSOLE_PASSWORD}
          --session.token_expiry_sec 7200 \
          --session.refresh_token_expiry_sec 86400
    volumes:
      - ./nakama/data:/nakama/data   
    ports:
      - "7350:7350"
      - "7351:7351"

volumes:
  postgres-data: